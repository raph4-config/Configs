# ─── PRO — professional messages ────────────────────────────
# Trigger prefix: ;  (text is French, except ;ooo in English)

matches:
  - trigger: ";mail"
    replace: "arn@ibanfirst.com"

  # Out-of-office auto-reply (English)
  - trigger: ";ooo"
    replace: "Hello,\n\nThank you for your message. I'm currently out of office until [DATE] with limited access to email. For anything urgent, please reach out to [CONTACT].\n\nI'll get back to you as soon as I'm back.\n\nBest regards,\nRaphaël"

  # Share a PR for review
  - trigger: ";rev"
    replace: "Salut, peux-tu relire ma PR quand tu as un moment ? [LIEN]\nMerci d'avance pour ton retour."

  # I'm on it / work in progress
  - trigger: ";wip"
    replace: "Je suis dessus, je te tiens au courant dès que c'est bon de mon côté."

  # It's done
  - trigger: ";done"
    replace: "C'est fait de mon côté, n'hésite pas si tu as des questions."

  # Ask for 2 minutes
  - trigger: ";dispo"
    replace: "Salut, tu aurais 2 minutes ?"

  # Acknowledge receipt
  - trigger: ";ack"
    replace: "Bien reçu, je regarde ça et je reviens vers toi rapidement."

  # Thanks
  - trigger: ";thx"
    replace: "Merci beaucoup pour ton aide !"

  # Message opener
  - trigger: ";hi"
    replace: "Bonjour,\n\nJ'espère que tu vas bien."

  # Follow-up reminder
  - trigger: ";relance"
    replace: "Petit message pour relancer sur le sujet ci-dessous. As-tu eu le temps d'y jeter un œil ?"

  # Suggest a call
  - trigger: ";call"
    replace: "Est-ce qu'un point rapide en visio serait plus simple pour en discuter ? Dis-moi tes dispos."

  # Ask for clarification
  - trigger: ";clar"
    replace: "Pour être sûr de bien comprendre, peux-tu me préciser [POINT] ?"

  # Politely decline a slot
  - trigger: ";nope"
    replace: "Désolé, je ne suis pas disponible sur ce créneau. Peux-tu me proposer un autre moment ?"

  # Flag a blocker
  - trigger: ";blok"
    replace: "Je suis bloqué sur [SUJET], j'aurais besoin d'un coup de main quand tu as un moment."

  # Meeting recap
  - trigger: ";recap"
    replace: "Pour résumer ce qu'on s'est dit : [POINTS]. N'hésite pas si j'ai oublié quelque chose."

  # Closing line
  - trigger: ";cu"
    replace: "Je reste dispo si besoin. Bonne journée !"
