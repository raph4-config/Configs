# ─── EMOJIS ──────────────────────────────────────────────────
# Three distinct prefixes, no overlap:
#   ;;  dev     @@  teams     ::  normal

matches:
  # ─── Dev (;;) ──────────────────────────────────────────────
  - trigger: ";;rocket"
    replace: "🚀"
  - trigger: ";;sparkle"
    replace: "✨"
  - trigger: ";;bug"
    replace: "🐛"
  - trigger: ";;fire"
    replace: "🔥"
  - trigger: ";;check"
    replace: "✅"
  - trigger: ";;wrench"
    replace: "🔧"
  - trigger: ";;recycle"
    replace: "♻️"
  - trigger: ";;warn"
    replace: "⚠️"
  - trigger: ";;memo"
    replace: "📝"
  - trigger: ";;boom"
    replace: "💥"

  # ─── Teams (@@) ────────────────────────────────────────────
  - trigger: "@@up"
    replace: "👍"
  - trigger: "@@down"
    replace: "👎"
  - trigger: "@@ok"
    replace: "👌"
  - trigger: "@@eyes"
    replace: "👀"
  - trigger: "@@party"
    replace: "🎉"
  - trigger: "@@think"
    replace: "🤔"
  - trigger: "@@pray"
    replace: "🙏"
  - trigger: "@@clap"
    replace: "👏"
  - trigger: "@@100"
    replace: "💯"
  - trigger: "@@muscle"
    replace: "💪"

  # ─── Normal (::) ───────────────────────────────────────────
  - trigger: "::smile"
    replace: "😄"
  - trigger: "::laugh"
    replace: "😂"
  - trigger: "::wink"
    replace: "😉"
  - trigger: "::cool"
    replace: "😎"
  - trigger: "::love"
    replace: "😍"
  - trigger: "::wow"
    replace: "😮"
  - trigger: "::sad"
    replace: "😞"
  - trigger: "::cry"
    replace: "😢"
  - trigger: "::heart"
    replace: "❤️"
